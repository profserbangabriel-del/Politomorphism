name: SRM Zelensky Validation

on:
  workflow_dispatch:
    inputs:
      A_value:
        description: 'Affective Weight A (0-1)'
        required: true
        default: '0.640'
      D_value:
        description: 'Semantic Drift D (0-1)'
        required: true
        default: '0.680'

jobs:
  validate_srm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install matplotlib numpy

      - name: Show files in repo
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== data_zelensky ==="
          ls -la data_zelensky/ 2>/dev/null || echo "FOLDER data_zelensky NOT FOUND"
          echo "=== All CSV files ==="
          find . -name "*.csv" | sort

      - name: Run SRM Zelensky Validation
        env:
          SRM_A: ${{ github.event.inputs.A_value }}
          SRM_D: ${{ github.event.inputs.D_value }}
        run: |
          python3 << 'PYEOF'
          import csv, json, math, statistics, os, glob

          # Auto-detect CSV files anywhere in repo
          all_csvs = glob.glob("**/*.csv", recursive=True) + glob.glob("*.csv")
          print("Found CSV files:", all_csvs)

          def find_csv(keywords):
              for f in all_csvs:
                  name = f.lower()
                  if all(k in name for k in keywords):
                      return f
              return None

          f_first  = find_csv(["zelensky", "first"])  or find_csv(["123234"])
          f_second = find_csv(["zelensky", "second"]) or find_csv(["123459"])
          f_europe = find_csv(["zelensky", "europe"]) or find_csv(["123844"])
          f_usa    = find_csv(["zelensky", "usa"])    or find_csv(["124014"])

          print(f"first_period : {f_first}")
          print(f"second_period: {f_second}")
          print(f"europe       : {f_europe}")
          print(f"usa          : {f_usa}")

          if not all([f_first, f_second, f_europe, f_usa]):
              print("ERROR: Could not find all CSV files!")
              exit(1)

          def load(path):
              with open(path, newline="", encoding="utf-8") as fp:
                  return list(csv.DictReader(fp))

          first  = load(f_first)
          second = load(f_second)
          usa    = load(f_usa)
          europe = load(f_europe)

          LAMBDA = 2
          A = float(os.environ.get("SRM_A", "0.640"))
          D = float(os.environ.get("SRM_D", "0.680"))

          baseline = statistics.mean([float(r["ratio"]) for r in first if float(r["ratio"]) > 0])
          peak_usa = max(float(r["ratio"]) for r in usa)
          peak_eur = max(float(r["ratio"]) for r in europe)
          V_usa = min(math.log(peak_usa / baseline) / math.log(100), 1.0)
          V_eur = min(math.log(peak_eur / baseline) / math.log(100), 1.0)
          V = round((V_usa + V_eur) / 2, 4)

          present = sum(1 for r in second if int(r["count"]) > 0)
          N = round(present / len(second), 4)

          sf  = math.exp(-LAMBDA * D)
          SRM = round(V * A * sf * N, 4)

          def interpret(s):
              if s >= 0.20: return "HIGH RESONANCE"
              if s >= 0.07: return "MEDIUM RESONANCE"
              if s >= 0.02: return "LOW RESONANCE"
              return "MINIMAL RESONANCE"

          print("=" * 50)
          print(f"V={V}  A={A}  D={D}  N={N}")
          print(f"SRM = {SRM}  ->  {interpret(SRM)}")
          print("=" * 50)

          result = {
              "symbol": "zelensky",
              "variables": {"V": V, "A": A, "D": D, "semantic_factor": round(sf,4), "N": N},
              "SRM": SRM,
              "interpretation": interpret(SRM)
          }
          with open("SRM_zelensky_result.json", "w") as f:
              json.dump(result, f, indent=2)
          print("Saved: SRM_zelensky_result.json")
          PYEOF

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: srm-zelensky-results
          path: SRM_zelensky_result.json
