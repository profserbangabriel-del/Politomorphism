name: SRM - Imran Khan 2018 Data Collection
on:
  workflow_dispatch:
jobs:
  collect-quantitative:
    name: Collect V, lambda, N, A
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytrends requests numpy scipy
      - name: Run collection
        run: python srm/imrankhan_2018/collect_imrankhan.py
        env:
          PYTHONUNBUFFERED: "1"
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: imrankhan-quant-${{ github.run_id }}
          path: srm/imrankhan_2018/results/
          retention-days: 90
      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add srm/imrankhan_2018/results/
          git diff --staged --quiet || git commit -m "ci: imrankhan 2018 quantitative [run ${{ github.run_id }}]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  collect-mediacloud:
    name: Collect PE, ICI, D
    runs-on: ubuntu-latest
    needs: collect-quantitative
    steps:
      - uses: actions/checkout@v4
      - name: Download quantitative results
        uses: actions/download-artifact@v4
        with:
          name: imrankhan-quant-${{ github.run_id }}
          path: srm/imrankhan_2018/results/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install NLP dependencies
        run: pip install mediacloud gensim scikit-learn numpy scipy
      - name: Run Media Cloud pipeline
        run: python srm/imrankhan_2018/collect_mediacloud.py
        env:
          MEDIACLOUD_API_KEY: ${{ secrets.MEDIACLOUD_API_KEY }}
          PYTHONUNBUFFERED: "1"
      - name: Print final params
        run: cat srm/imrankhan_2018/results/imrankhan_2018_srm_params.json
      - name: Upload complete results
        uses: actions/upload-artifact@v4
        with:
          name: imrankhan-complete-${{ github.run_id }}
          path: srm/imrankhan_2018/results/
          retention-days: 365
      - name: Commit complete results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add srm/imrankhan_2018/results/
          git diff --staged --quiet || git commit -m "ci: imrankhan 2018 PE/ICI complete [run ${{ github.run_id }}]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [collect-quantitative, collect-mediacloud]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: srm/imrankhan_2018/results/
          merge-multiple: true
      - name: Print summary
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          f = Path("srm/imrankhan_2018/results/imrankhan_2018_srm_params.json")
          if f.exists():
              d = json.load(open(f))
              p = d["srm_params"]
              print("=" * 50)
              print("SRM: Imran Khan 2018")
              print("=" * 50)
              for k, v in p.items():
                  print(f"  {k:8} = {v}")
          else:
              print("No results yet.")
          EOF
