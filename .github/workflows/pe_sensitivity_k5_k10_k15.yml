name: PE Sensitivity Analysis (K=5 vs K=10 vs K=15)

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: >
          Comma-separated symbol names. Must match filenames in repo root
          as <symbol>-DATA.csv. Example: Trump,Modi,Modi2019,Modi2024,Putin
        required: false
        default: "Trump,Modi,Modi2019,Modi2024,Putin,Sunflower,CharlieHebdo"
      bootstrap_n:
        description: Bootstrap iterations for PE confidence intervals
        required: false
        default: "200"
      k_values:
        description: "K values to test (space-separated)"
        required: false
        default: "5 10 15"

jobs:
  pe-sensitivity:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            scikit-learn==1.4.2 \
            numpy==1.26.4 \
            pandas==2.2.2

      - name: List available corpus files
        run: |
          echo "=== CSV files in repo root ==="
          ls -la *.csv || echo "No CSV files in root"

      - name: Prepare symbols list
        id: prep
        run: |
          SYMBOLS="${{ github.event.inputs.symbols }}"
          echo "symbols_clean=$(echo $SYMBOLS | tr ',' ' ')" >> $GITHUB_OUTPUT

      - name: Run PE sensitivity analysis
        run: |
          python scripts/pe_sensitivity_analysis.py \
            --input_dir . \
            --symbols ${{ steps.prep.outputs.symbols_clean }} \
            --output_dir sensitivity_results \
            --bootstrap_n ${{ github.event.inputs.bootstrap_n }} \
            --k_values ${{ github.event.inputs.k_values }}

      - name: Display summary report
        run: cat sensitivity_results/pe_sensitivity_summary.txt

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PE-Sensitivity-Results-K5-K10-K15
          path: sensitivity_results/
          retention-days: 90

      - name: Job summary
        run: |
          echo "## PE Sensitivity Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Symbols:** \`${{ github.event.inputs.symbols }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**K values:** \`${{ github.event.inputs.k_values }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Bootstrap n:** \`${{ github.event.inputs.bootstrap_n }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat sensitivity_results/pe_sensitivity_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
