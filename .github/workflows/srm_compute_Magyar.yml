name: SRM Compute — Magyar 2024-2026

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol name (no spaces)'
        required: true
        default: 'Magyar'
      query:
        description: 'Search query for Media Cloud'
        required: true
        default: 'Peter Magyar OR Péter Magyar OR Tisza party Hungary'
      start_date:
        description: 'Start date YYYY-MM-DD'
        required: true
        default: '2024-02-01'
      end_date:
        description: 'End date YYYY-MM-DD'
        required: true
        default: '2026-04-12'
      lambda_value:
        description: 'Lambda (from Google Trends — leave 0 to auto-estimate)'
        required: true
        default: '3.85'
      bootstrap_n:
        description: 'Bootstrap iterations'
        required: true
        default: '200'
      max_articles:
        description: 'Max articles to fetch'
        required: true
        default: '4000'

jobs:
  compute-srm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            mediacloud==4.6.0 \
            vaderSentiment==3.3.2 \
            scikit-learn==1.4.2 \
            sentence-transformers==2.7.0 \
            numpy==1.26.4 \
            scipy==1.13.0 \
            pytrends==4.9.2 \
            requests==2.31.0

      - name: Fetch articles from Media Cloud
        env:
          MC_API_KEY:  ${{ secrets.MEDIACLOUD_API_KEY }}
          SYMBOL:      ${{ github.event.inputs.symbol }}
          QUERY:       ${{ github.event.inputs.query }}
          START_DATE:  ${{ github.event.inputs.start_date }}
          END_DATE:    ${{ github.event.inputs.end_date }}
          MAX_ART:     ${{ github.event.inputs.max_articles }}
        run: |
          python3 - << 'PYEOF'
          import mediacloud.api as mc
          import json, os, datetime, csv

          symbol   = os.environ["SYMBOL"].strip()
          query    = os.environ["QUERY"].strip()
          start    = os.environ["START_DATE"].strip()
          end      = os.environ["END_DATE"].strip()
          max_art  = int(os.environ["MAX_ART"].strip())
          api_key  = os.environ["MC_API_KEY"].strip()

          print(f"Symbol: {symbol}")
          print(f"Query:  {query}")
          print(f"Period: {start} -> {end}")

          search = mc.SearchApi(api_key)

          start_dt = datetime.datetime.strptime(start, "%Y-%m-%d").date()
          end_dt   = datetime.datetime.strptime(end,   "%Y-%m-%d").date()

          all_stories = []
          page = None
          while len(all_stories) < max_art:
              result, page = search.story_list(
                  query,
                  start_date=start_dt,
                  end_date=end_dt,
                  pagination_token=page,
                  collection_ids=[34412234],
              )
              if not result:
                  break
              all_stories.extend(result)
              print(f"  Fetched: {len(all_stories)} articles...")
              if page is None:
                  break

          all_stories = all_stories[:max_art]
          print(f"Total articles: {len(all_stories)}")

          def make_serializable(obj):
              if isinstance(obj, dict):
                  return {k: make_serializable(v) for k, v in obj.items()}
              elif isinstance(obj, list):
                  return [make_serializable(i) for i in obj]
              elif isinstance(obj, (datetime.datetime, datetime.date)):
                  return obj.isoformat()
              else:
                  return obj

          all_stories_clean = make_serializable(all_stories)

          os.makedirs("data", exist_ok=True)
          with open(f"data/{symbol}-DATA.json", "w") as f:
              json.dump(all_stories_clean, f)

          with open(f"{symbol}-DATA.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["title", "publish_date", "url", "language"])
              for s in all_stories_clean:
                  w.writerow([
                      s.get("title",""),
                      s.get("publish_date",""),
                      s.get("url",""),
                      s.get("language",""),
                  ])

          print(f"Saved {symbol}-DATA.csv")
          PYEOF

      - name: Compute D (PE + ICI) with bootstrap n=200
        env:
          SYMBOL:      ${{ github.event.inputs.symbol }}
          BOOTSTRAP_N: ${{ github.event.inputs.bootstrap_n }}
        run: |
          python3 - << 'PYEOF'
          import json, random, numpy as np, os
          from sklearn.decomposition import LatentDirichletAllocation
          from sklearn.feature_extraction.text import CountVectorizer
          from sentence_transformers import SentenceTransformer
          from sklearn.metrics.pairwise import cosine_similarity
          from scipy.spatial.distance import jensenshannon

          symbol      = os.environ["SYMBOL"].strip()
          alpha       = 0.5
          bootstrap_n = int(os.environ["BOOTSTRAP_N"].strip())
          K           = 10
          seed        = 42

          with open(f"data/{symbol}-DATA.json") as f:
              stories = json.load(f)

          texts = [s.get("title","") + " " + s.get("description","") for s in stories]
          texts = [t.strip() for t in texts if len(t.strip()) > 20]
          print(f"Valid texts: {len(texts)}")

          print("Computing PE (LDA)...")
          vectorizer = CountVectorizer(
              max_df=0.95, min_df=2,
              max_features=5000,
              stop_words="english"
          )
          X = vectorizer.fit_transform(texts)

          lda = LatentDirichletAllocation(
              n_components=K, random_state=seed,
              max_iter=20, learning_method="batch"
          )
          doc_topics = lda.fit_transform(X)

          n = len(doc_topics)
          pairs = [(i, j) for i in range(n) for j in range(i+1, n)]
          sample_pairs = random.sample(pairs, min(5000, len(pairs)))
          jsd_vals = [jensenshannon(doc_topics[i], doc_topics[j])**2 for i, j in sample_pairs]
          PE = float(np.mean(jsd_vals))
          print(f"  PE = {PE:.4f}")

          print("Computing ICI (sentence embeddings)...")
          model = SentenceTransformer("paraphrase-multilingual-MiniLM-L12-v2")
          sample_texts = random.sample(texts, min(500, len(texts)))
          embeddings = model.encode(sample_texts, show_progress_bar=False)
          sim_matrix = cosine_similarity(embeddings)
          upper = sim_matrix[np.triu_indices(len(sample_texts), k=1)]
          ICI = float(1 - np.mean(upper))
          print(f"  ICI = {ICI:.4f}")

          print(f"Bootstrap n={bootstrap_n}...")
          D_boots = []
          indices = list(range(len(texts)))
          for b in range(bootstrap_n):
              sample_idx = random.choices(indices, k=len(indices))
              sample_t   = [texts[i] for i in sample_idx]

              Xb = vectorizer.transform(sample_t)
              dt = lda.transform(Xb)
              sp = random.sample(list(range(len(dt))), min(500, len(dt)))
              jsd_b = [jensenshannon(dt[sp[i]], dt[sp[j]])**2
                       for i in range(len(sp)) for j in range(i+1, len(sp))][:1000]
              PE_b = float(np.mean(jsd_b)) if jsd_b else PE

              st = random.sample(sample_t, min(200, len(sample_t)))
              emb_b = model.encode(st, show_progress_bar=False)
              sim_b = cosine_similarity(emb_b)
              up_b  = sim_b[np.triu_indices(len(st), k=1)]
              ICI_b = float(1 - np.mean(up_b))

              D_boots.append(alpha * PE_b + (1 - alpha) * ICI_b)

              if (b+1) % 50 == 0:
                  print(f"  Bootstrap {b+1}/{bootstrap_n} done")

          D_mean  = float(np.mean(D_boots))
          D_std   = float(np.std(D_boots))
          D_ci_lo = float(np.percentile(D_boots, 2.5))
          D_ci_hi = float(np.percentile(D_boots, 97.5))

          result = {
              "symbol": symbol,
              "D_result": {
                  "PE": round(PE, 4),
                  "ICI": round(ICI, 4),
                  "D": round(D_mean, 4),
                  "alpha": alpha,
                  "D_std": round(D_std, 4),
                  "D_ci_low": round(D_ci_lo, 4),
                  "D_ci_high": round(D_ci_hi, 4),
                  "n_docs": len(texts),
                  "bootstrap_n": bootstrap_n,
              }
          }

          print(f"\nD = {D_mean:.4f} +/- {D_std:.4f} [{D_ci_lo:.4f}, {D_ci_hi:.4f}]")

          with open(f"D_result_{symbol}.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"Saved D_result_{symbol}.json")
          PYEOF

      - name: Compute V, A, N, SRM
        env:
          SYMBOL:       ${{ github.event.inputs.symbol }}
          LAMBDA_VALUE: ${{ github.event.inputs.lambda_value }}
          START_DATE:   ${{ github.event.inputs.start_date }}
          END_DATE:     ${{ github.event.inputs.end_date }}
        run: |
          python3 - << 'PYEOF'
          import json, math, numpy as np, datetime, os
          from collections import defaultdict
          from vaderSentiment.vaderSentiment import SentimentIntensityAnalyzer

          symbol     = os.environ["SYMBOL"].strip()
          lam        = float(os.environ["LAMBDA_VALUE"].strip())
          start_date = os.environ["START_DATE"].strip()
          end_date   = os.environ["END_DATE"].strip()

          with open(f"data/{symbol}-DATA.json") as f:
              stories = json.load(f)

          with open(f"D_result_{symbol}.json") as f:
              d_data = json.load(f)
          D = d_data["D_result"]["D"]

          start_dt   = datetime.datetime.strptime(start_date, "%Y-%m-%d")
          end_dt     = datetime.datetime.strptime(end_date,   "%Y-%m-%d")
          total_days = (end_dt - start_dt).days + 1

          dates_with_articles = set()
          for s in stories:
              pd_val = s.get("publish_date", "")
              if pd_val:
                  dates_with_articles.add(str(pd_val)[:10])
          N = round(len(dates_with_articles) / total_days, 4)

          daily_counts = defaultdict(int)
          for s in stories:
              pd_val = s.get("publish_date", "")
              if pd_val:
                  daily_counts[str(pd_val)[:10]] += 1

          all_dates = sorted(daily_counts.keys())
          counts    = [daily_counts[d] for d in all_dates]
          if len(counts) >= 60:
              baseline = float(np.mean(counts[:30]))
              peak_val = float(np.max(counts))
              if baseline > 0 and peak_val > 0:
                  V_raw = math.log((peak_val / baseline) + 1)
                  V = min(round(V_raw / math.log(51), 4), 1.0)
              else:
                  V = 0.5
          else:
              V = 0.5

          analyzer = SentimentIntensityAnalyzer()
          scores = []
          for s in stories:
              title = s.get("title", "")
              if title and len(title) > 5:
                  sc = analyzer.polarity_scores(title)
                  scores.append(abs(sc["compound"]))
          A = round(float(np.mean(scores)), 4) if scores else 0.15

          SRM = V * A * math.exp(-lam * D) * N

          result = {
              "symbol": symbol,
              "V": round(V, 4),
              "A": round(A, 4),
              "N": round(N, 4),
              "lambda": lam,
              "start": start_date,
              "end": end_date,
              "n_articles": len(stories),
              "D": D,
              "SRM": round(SRM, 8),
          }

          print(f"\n{'='*50}")
          print(f"Symbol:  {symbol}")
          print(f"V={V}  A={A}  N={N}  D={D}  lam={lam}")
          print(f"SRM = {SRM:.8f}")
          print(f"{'='*50}")

          with open(f"V_A_N_{symbol}.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"Saved V_A_N_{symbol}.json")
          PYEOF

      - name: Calibrate alpha (exploratory)
        run: python3 scripts/calibrate_alpha.py

      - name: Test hypotheses
        run: python3 scripts/test_hypotheses.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: D-computation-Magyar-${{ github.run_number }}
          retention-days: 90
          path: |
            D_result_${{ github.event.inputs.symbol }}.json
            V_A_N_${{ github.event.inputs.symbol }}.json
            ${{ github.event.inputs.symbol }}-DATA.csv
            alpha_calibration_results.json
            hypothesis_test_results.json

      - name: Commit results to repo
        env:
          SYMBOL: ${{ github.event.inputs.symbol }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage fișierele ÎNAINTE de pull — evită "unstaged changes" la rebase
          git add \
            "D_result_${SYMBOL}.json" \
            "V_A_N_${SYMBOL}.json" \
            "${SYMBOL}-DATA.csv" \
            alpha_calibration_results.json \
            hypothesis_test_results.json || true

          git pull --rebase origin main

          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Add SRM results: ${SYMBOL} [Run #${{ github.run_number }}]"
          git push origin main
