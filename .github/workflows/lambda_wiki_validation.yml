name: Lambda Robustness Test

on:
  workflow_dispatch:

jobs:
  lambda-robustness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests scipy numpy

      - name: Run validation
        run: python srm/lambda_wiki_validation.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: lambda-wiki-results
          path: lambda_wiki_results.json
